<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; line-height: 1.6; color: #333; }
    a { color: #4183c4; text-decoration: none; }
    a:hover { color: #1a6eb5; }
    h1, h2, h3 { color: #1a1a1a; }
    .nav { margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f6f8fa; }
    pre { background: #f6f8fa; padding: 1rem; overflow-x: auto; }
    blockquote { border-left: 3px solid #ddd; margin-left: 0; padding-left: 1rem; color: #555; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="{{ site.baseurl }}/">← Оглавление</a>
  </nav>
  {{ content }}
  <footer>
    <a href="https://github.com/EchoLibero/bible">GitHub</a> · Странная Петля · Эхо Либеро
  </footer>
</body>
</html>
